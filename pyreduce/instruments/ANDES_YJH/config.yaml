# ANDES_YJH instrument configuration
# ANDES near-infrared echelle spectrograph with 75 fibers per order
# Three channels: YJH (full Y+J+H coverage), H (H-band only), Y (Y-band only)

__instrument__: ANDES_YJH
instrument: PYE1
id_instrument: ".*ZEMAX.*"
telescope: ELT

date: DATE-OBS
date_format: fits

# Three channels with different wavelength coverage
# YJH: ~0.95-1.8 µm (Y+J+H bands combined)
# H: ~1.45-1.8 µm (H-band only)
# Y: ~0.95-1.12 µm (Y-band only)
channels: [YJH, H, Y]
extension: 0
orientation: 0
transpose: false

prescan_x: 0
overscan_x: 0
prescan_y: 0
overscan_y: 0
naxis_x: NAXIS1
naxis_y: NAXIS2

gain: 1
readnoise: 0
dark: 0
sky: 0
exposure_time: EXPTIME

ra: null
dec: null
target: PYE1

# File classification
# For fiber bundle tracing, we need separate even/odd flat files
# Files are matched by channel prefix (YJH_, H_, Y_) and type suffix
kw_bias: PYE1
kw_flat: PYE1
kw_flat_even: FILENAME
kw_flat_odd: FILENAME
kw_orders: PYE1
kw_wave: PYE1
kw_spec: PYE1
kw_channel: FILENAME

id_bias: ".*bias.*"
id_flat: ".*"
id_flat_even: ".*even.*"
id_flat_odd: ".*odd.*"
id_orders: ".*"
id_wave: ".*"
id_spec: ".*"
# Channel identification by filename prefix
id_channel_yjh: "^YJH_.*|^J_.*"
id_channel_h: "^H_.*"
id_channel_y: "^Y_.*"

# Fiber grouping configuration
# 75 fibers per order, organized into logical groups
# A/B/cal: spatial division of the slit
# ring0-4: IFU hexagonal structure (center to outer rings)
fibers:
  per_order: true
  fibers_per_order: 75
  # Channel-specific order centers: order_centers_yjh.yaml, order_centers_h.yaml, order_centers_y.yaml
  order_centers_file: order_centers_{channel}.yaml
  groups:
    # Spatial groups
    A:
      range: [1, 36]
      merge: average
    cal:
      range: [37, 40]
      merge: average
    B:
      range: [40, 76]
      merge: average
    # IFU rings (fiber 1,75=cal, 2=gap, gaps between rings)
    ifu:
      range: [3, 74]
      merge: average
    ring0:
      range: [3, 4]
      merge: average
    ring1:
      range: [6, 17]
      merge: average
    ring2:
      range: [18, 30]
      merge: average
    ring3:
      range: [31, 49]
      merge: average
    ring4:
      range: [50, 74]
      merge: average
  use:
    science: [A, B]
    wavecal: [cal]
    norm_flat: all
