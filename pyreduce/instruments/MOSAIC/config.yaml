# MOSAIC instrument configuration
# Multi-object spectrograph with fiber bundles

__instrument__: MOSAIC

instrument: MOSAIC
id_instrument: ".*MOSAIC.*"
telescope: ELT

date: DATE-OBS
date_format: fits

# Channel naming follows the E2E `ESO INS MODE` header verbatim:
#   NIR (one 4096x4096 detector per mode): J_LR, H_LR, H_HR
#   VIS (each mode is a 12788x12394 four-detector mosaic): B_LR, B1_HR, B2_HR,
#        R_LR, R1_HR, R2_HR -- each fanned out by detector quadrant LL/LR/UL/UR.
# A VIS channel is <mode>_<quadrant>; the mode half selects files (kw_channel),
# the quadrant half selects the crop (see MOSAIC.QUADRANTS in __init__.py).
# The detectors are slightly misaligned with a non-uniform gap, so each quadrant
# is reduced independently rather than tracing across the mosaic.
channels:
  - J_LR
  - H_LR
  - H_HR
  - B_LR_LL
  - B_LR_LR
  - B_LR_UL
  - B_LR_UR
  - B1_HR_LL
  - B1_HR_LR
  - B1_HR_UL
  - B1_HR_UR
  - B2_HR_LL
  - B2_HR_LR
  - B2_HR_UL
  - B2_HR_UR
  - R_LR_LL
  - R_LR_LR
  - R_LR_UL
  - R_LR_UR
  - R1_HR_LL
  - R1_HR_LR
  - R1_HR_UL
  - R1_HR_UR
  - R2_HR_LL
  - R2_HR_LR
  - R2_HR_UL
  - R2_HR_UR

# Mode is carried in the header; used both to auto-select the channel and to
# classify which files belong to a channel (the quadrant suffix is stripped).
instrument_mode: "ESO INS MODE"
kw_channel: "ESO INS MODE"

extension: 0
orientation: 0
transpose: false

prescan_x: 0
overscan_x: 0
prescan_y: 0
overscan_y: 0
naxis_x: 4096
naxis_y: 4096

gain: 1
readnoise: 0
dark: 0
sky: 0
exposure_time: EXPTIME

ra: null
dec: null
target: MOSAIC

# File classification
# Since this is simulated data, match by filename patterns
kw_bias: FILENAME
kw_flat: FILENAME
kw_orders: FILENAME
kw_wave: FILENAME
kw_spec: FILENAME

id_bias: ".*BIAS.*"
id_flat: ".*FLAT.*"
id_orders: ".*FLAT.*"
id_wave: ".*ThAr.*"
id_spec: ".*"

# Fiber grouping configuration
# IFU targets with ~7 fibers each
# bundle_centers_file assigns traces to bundles by proximity, handling missing fibers
fibers:
  bundles:
    size: 7
    # center_weight: inverse-distance weighted average of detected fibers
    # around bundle_center, so a missing center fiber doesn't shift the
    # merged y by one fiber slot.
    merge: center_weight
    bundle_centers_file: bundle_centers_{channel}.yaml
  use:
    curvature: groups
    wavecal_master: groups
    science: groups
