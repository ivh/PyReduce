# MOSAIC instrument configuration
# Multi-object spectrograph with fiber bundles

__instrument__: MOSAIC

instrument: MOSAIC
id_instrument: ".*MOSAIC.*"
telescope: ELT

date: DATE-OBS
date_format: fits

# NIR channel and VIS quadrants (VIS1-VIS4)
# VIS detector is a 4-quadrant mosaic, each quadrant processed separately
# NIR is the legacy E2E REF NIR simulation; LR-J / LR-H are the newer
# pyechelle ZEMAX-model simulations on the same H4RG detector.
channels: [NIR, LR-J, LR-H, VIS1, VIS2, VIS3, VIS4]
instrument_mode: BAND
extension: 0
orientation: 0
transpose: false

prescan_x: 0
overscan_x: 0
prescan_y: 0
overscan_y: 0
naxis_x: 4096
naxis_y: 4096

gain: 1
readnoise: 0
dark: 0
sky: 0
exposure_time: EXPTIME

ra: null
dec: null
target: MOSAIC

# File classification
# Since this is simulated data, match by filename patterns
kw_bias: FILENAME
kw_flat: FILENAME
kw_orders: FILENAME
kw_wave: FILENAME
kw_spec: FILENAME

id_bias: ".*BIAS.*"
id_flat: ".*FLAT.*"
id_orders: ".*FLAT.*"
id_wave: ".*ThAr.*"
id_spec: ".*"

# Initial wavelength guess for wavecal_init, indexed by channel.
# Each entry is a list of per-order [min, max] in Angstroms.
# VIS: derived from MOSAIC_VIS_LR_Blue.hdf (fiber_462, detector y-center),
#      with a -30 px blueward shift to match the as-built ThAr reference.
# NIR/LR-J/LR-H: center fiber of the corresponding HDF; refine per-fiber
#                later for the curved-slit NIR channels.
wavelength_range:
  - [[9500.0, 13400.0]]    # NIR   (legacy 2Cam, J-band coverage)
  - [[9500.0, 13400.0]]    # LR-J
  - [[14300.0, 18000.0]]   # LR-H
  - [[5117.3, 6250.0]]     # VIS1  (lower-left:  detector x=0..6144)
  - [[3900.0, 5096.8]]     # VIS2  (lower-right: detector x=6249..12393)
  - [[5117.3, 6250.0]]     # VIS3  (upper-left:  detector x=0..6144)
  - [[3900.0, 5096.8]]     # VIS4  (upper-right: detector x=6249..12393)

# Fiber grouping configuration
# IFU targets with ~7 fibers each
# bundle_centers_file assigns traces to bundles by proximity, handling missing fibers
fibers:
  bundles:
    size: 7
    # center_weight: inverse-distance weighted average of detected fibers
    # around bundle_center, so a missing center fiber doesn't shift the
    # merged y by one fiber slot.
    merge: center_weight
    # Bundle centers come from MOSAIC.assign_bundles() reading FIBRE_TABLE
    # in the raw FITS, not from a YAML.
  use:
    curvature: groups
    wavecal_master: groups
    science: groups
